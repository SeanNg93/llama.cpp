name: Build Windows Vulkan

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout mtp-clean from original repo
        uses: actions/checkout@v4
        with:
          repository: am17an/llama.cpp
          ref: mtp-clean

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Check Vulkan SDK
        shell: pwsh
        run: |
          echo "VULKAN_SDK=$env:VULKAN_SDK"
          where glslc
          where vulkan-1.dll

      - name: Configure
        run: cmake -B build -DBUILD_SHARED_LIBS=OFF -DGGML_VULKAN=ON -DGGML_NATIVE=OFF

      - name: Build
        run: cmake --build build --config Release --target llama-cli llama-server

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifact
          Copy-Item build/bin/Release/llama-server.exe artifact/
          Copy-Item build/bin/Release/llama-cli.exe artifact/
          Copy-Item build/bin/Release/*.dll artifact/ -ErrorAction SilentlyContinue
          Copy-Item "$env:VULKAN_SDK\Bin\*.dll" artifact/ -ErrorAction SilentlyContinue

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-mtp-windows-vulkan
          path: artifact/*
